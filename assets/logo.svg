<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- MyBI mark: a pie whose top-right 25% quarter is a bar chart; the other 270deg
       are three unequal slices. Matches the app icon (logo-source-pie.svg). Full-bleed
       rounded tile so it reads cleanly as a favicon and a site brand chip. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a2142"/>
      <stop offset="1" stop-color="#0a0e1c"/>
    </linearGradient>
    <linearGradient id="pa" x1="700" y1="430" x2="360" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cf7bff"/><stop offset="1" stop-color="#a93aea"/>
    </linearGradient>
    <linearGradient id="pb" x1="340" y1="758" x2="300" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3aa0ff"/><stop offset="1" stop-color="#1570ef"/>
    </linearGradient>
    <linearGradient id="pc" x1="300" y1="380" x2="512" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9b8afb"/><stop offset="1" stop-color="#6938ef"/>
    </linearGradient>
    <linearGradient id="bar" x1="512" y1="240" x2="512" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8fd6"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#glow)"/>

  <!-- Three unequal slices (270deg). Centre (512,512) r=300. Thin gaps separate parts. -->
  <g stroke="#0a0e1c" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <path d="M512 512 L812 512 A300 300 0 0 1 339.9 757.8 Z" fill="url(#pa)"/>
    <path d="M512 512 L339.9 757.8 A300 300 0 0 1 252.2 362 Z" fill="url(#pb)"/>
    <path d="M512 512 L252.2 362 A300 300 0 0 1 512 212 Z" fill="url(#pc)"/>
  </g>

  <!-- The 25% quarter (top-right): a bar chart rising from the centre. -->
  <g fill="url(#bar)">
    <rect x="556" y="372" width="50" height="128" rx="12"/>
    <rect x="624" y="268" width="50" height="232" rx="12"/>
    <rect x="692" y="330" width="50" height="170" rx="12"/>
    <rect x="760" y="412" width="40" height="88" rx="12"/>
  </g>

  <!-- Centre pivot -->
  <circle cx="512" cy="512" r="30" fill="#0a0e1c" stroke="#7c6cf2" stroke-width="7"/>
</svg>
